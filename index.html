<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>休暇申請システム</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

  :root {
    --ink: #1a1a2e;
    --ink-light: #4a4a6a;
    --ink-muted: #8888aa;
    --bg: #f7f7fb;
    --bg-white: #ffffff;
    --accent: #3d5a99;
    --accent-light: #e8edf8;
    --border: #dddde8;
    --stamp-red: #c0392b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  .top-bar {
    background: var(--accent);
    color: white;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .top-bar h1 { font-size: 18px; font-weight: 500; letter-spacing: 0.05em; }
  .top-bar .icon { font-size: 22px; }

  #menuScreen { max-width: 700px; margin: 48px auto; padding: 0 24px; }
  .menu-title { font-size: 13px; font-weight: 500; color: var(--ink-muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 20px; }
  .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .menu-card {
    background: var(--bg-white); border: 1px solid var(--border); border-radius: 10px;
    padding: 24px 20px; cursor: pointer; transition: all 0.18s ease;
    display: flex; align-items: flex-start; gap: 14px;
  }
  .menu-card:hover { border-color: var(--accent); background: var(--accent-light); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(61,90,153,0.12); }
  .menu-card .card-icon { font-size: 28px; flex-shrink: 0; }
  .menu-card .card-text h3 { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  .menu-card .card-text p { font-size: 12px; color: var(--ink-muted); line-height: 1.5; }

  #formScreen { display: none; }
  .form-wrap { max-width: 720px; margin: 0 auto; padding: 32px 24px 80px; }

  .back-btn {
    display: inline-flex; align-items: center; gap: 6px; font-size: 13px;
    color: var(--accent); cursor: pointer; margin-bottom: 28px;
    background: none; border: none; padding: 0; font-family: inherit;
  }
  .back-btn:hover { text-decoration: underline; }

  .doc {
    background: var(--bg-white); border: 1px solid var(--border);
    border-radius: 10px; padding: 40px 44px; position: relative;
    margin-bottom: 20px;
  }
  .doc + .doc { border-top: 3px solid var(--accent-light); }

  .doc-date { text-align: right; font-size: 13px; margin-bottom: 28px; color: var(--ink-light); }
  .doc-date input[type="date"] {
    border: none; border-bottom: 1px solid var(--border); font-size: 13px;
    font-family: inherit; color: var(--ink); background: transparent; padding: 2px 4px; outline: none; cursor: pointer;
  }
  .doc-date input[type="date"]:focus { border-bottom-color: var(--accent); }

  .doc-title { text-align: center; font-size: 20px; font-weight: 700; letter-spacing: 0.12em; margin-bottom: 32px; }

  .doc-meta { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .doc-meta-row { display: flex; align-items: center; gap: 8px; }
  .doc-meta-row label { font-size: 13px; min-width: 48px; color: var(--ink-light); }
  .doc-meta-row input {
    flex: 1; border: none; border-bottom: 1px solid var(--border);
    font-size: 14px; font-family: inherit; color: var(--ink); background: transparent; padding: 4px 6px; outline: none;
  }
  .doc-meta-row input:focus { border-bottom-color: var(--accent); }

  .doc-intro { font-size: 13px; margin-bottom: 20px; color: var(--ink-light); }
  .doc-kei { font-size: 14px; font-weight: 500; margin-bottom: 16px; letter-spacing: 0.08em; }

  .doc-fields { display: flex; flex-direction: column; gap: 18px; margin-bottom: 28px; }
  .field-row { display: flex; align-items: flex-start; gap: 12px; }
  .field-label { font-size: 13px; min-width: 80px; padding-top: 6px; color: var(--ink-light); flex-shrink: 0; }
  .field-input { flex: 1; }
  .field-input input, .field-input textarea, .field-input select {
    width: 100%; border: none; border-bottom: 1px solid var(--border);
    font-size: 14px; font-family: inherit; color: var(--ink); background: transparent; padding: 4px 6px; outline: none; resize: none;
  }
  .field-input input:focus, .field-input textarea:focus { border-bottom-color: var(--accent); }

  .date-range { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .date-range input[type="date"] { width: auto; flex: 1; min-width: 130px; }
  .date-range span { font-size: 13px; color: var(--ink-muted); flex-shrink: 0; }
  .date-range .days-count { font-size: 12px; color: var(--ink-muted); white-space: nowrap; }

  .duration-select { margin-top: 8px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .duration-select > span { font-size: 13px; color: var(--ink-light); }
  .duration-select label { font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 4px; }

  .doc-ijo { text-align: right; font-size: 13px; color: var(--ink-light); margin-bottom: 36px; }

  .approval-section { border-top: 1px solid var(--border); padding-top: 24px; display: flex; justify-content: flex-end; }
  .approval-box { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; width: 140px; }
  .approval-box .approval-header { background: var(--bg); text-align: center; font-size: 12px; padding: 6px; border-bottom: 1px solid var(--border); color: var(--ink-light); letter-spacing: 0.08em; }
  .approval-box .approval-body { height: 80px; display: flex; align-items: center; justify-content: center; position: relative; }
  .stamp {
    width: 64px; height: 64px; border: 2px solid var(--stamp-red); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--stamp-red); font-size: 13px; font-weight: 700; letter-spacing: 0.05em;
    opacity: 0; transform: rotate(-12deg); transition: opacity 0.3s ease;
    pointer-events: none; position: absolute;
  }
  .stamp.visible { opacity: 1; }
  .approval-sign-btn {
    background: none; border: 1px dashed var(--border); border-radius: 4px;
    font-size: 11px; color: var(--ink-muted); cursor: pointer; padding: 6px 10px;
    font-family: inherit; transition: all 0.15s;
  }
  .approval-sign-btn:hover { border-color: var(--accent); color: var(--accent); }

  .page-divider {
    text-align: center; margin: 8px 0; font-size: 12px; color: var(--ink-muted);
    display: flex; align-items: center; gap: 8px;
  }
  .page-divider::before, .page-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .action-bar { margin-top: 16px; display: flex; gap: 12px; justify-content: flex-end; flex-wrap: wrap; }
  .btn-primary {
    background: var(--accent); color: white; border: none; border-radius: 7px;
    padding: 12px 28px; font-size: 14px; font-family: inherit; font-weight: 500;
    cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.15s;
  }
  .btn-primary:hover { background: #2e4580; }
  .btn-secondary {
    background: var(--bg-white); color: var(--ink-light); border: 1px solid var(--border);
    border-radius: 7px; padding: 12px 24px; font-size: 14px; font-family: inherit;
    cursor: pointer; transition: border-color 0.15s;
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-add {
    background: var(--accent-light); color: var(--accent); border: 1px dashed var(--accent);
    border-radius: 7px; padding: 12px 24px; font-size: 14px; font-family: inherit;
    cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.15s;
  }
  .btn-add:hover { background: var(--accent); color: white; }

  .print-date { display: none; }

  @media print {
    body { background: white; }
    .top-bar, .back-btn, .action-bar, .approval-sign-btn, .page-divider, .duration-select { display: none !important; }
    #menuScreen { display: none !important; }
    #formScreen { display: block !important; }
    .form-wrap { padding: 0; margin: 0; max-width: 100%; }
    .doc { border: none; border-radius: 0; padding: 20px 30px; page-break-after: always; margin-bottom: 0; }
    .doc:last-of-type { page-break-after: avoid; }
    .doc-meta-row input, .field-input input, .field-input textarea { border-bottom: 1px solid #ccc; }
    input[type="date"] { display: none !important; }
    .print-date { display: inline !important; font-size: 14px; border-bottom: 1px solid #ccc; padding-bottom: 2px; }
    .doc-date .print-date { font-size: 13px; border-bottom: none; }
    #docDateYobi { display: none !important; }
    .stamp { opacity: 1 !important; }
  }

  @media (max-width: 560px) {
    .menu-grid { grid-template-columns: 1fr; }
    .doc { padding: 24px 20px; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <span class="icon">&#x1F4CB;</span>
  <h1>休暇申請システム</h1>
</div>

<div id="menuScreen">
  <div style="max-width:700px; margin:48px auto; padding:0 24px;">
    <div class="menu-title">申請の種類を選択してください</div>
    <div class="menu-grid" id="menuGrid"></div>
  </div>
</div>

<div id="formScreen">
  <div class="form-wrap">
    <button class="back-btn" onclick="goBack()">&#x2190; 申請一覧に戻る</button>
    <div id="docContainer"></div>
    <div class="action-bar">
      <button class="btn-secondary" onclick="clearAll()">クリア</button>
      <button class="btn-add" onclick="addPage()" id="addPageBtn">&#x2795; ページを追加</button>
      <button class="btn-primary" onclick="printDoc()">&#x1F5A8; PDF出力 / 印刷</button>
    </div>
  </div>
</div>

<script>
const APPLICATIONS = [
  {
    id: 'yuukyu',
    icon: '&#x1F33F;',
    name: '有給申請',
    desc: '有給休暇の取得申請',
    docTitle: '有給休暇申請書',
    intro: '下記の通り、有給休暇を申請いたします。',
    showDuration: true,
    fields: [
      { type: 'daterange', label: '1. 期間', id: 'period' },
      { type: 'text', label: '2. 事由', id: 'reason', placeholder: '例：私用のため' },
      { type: 'textarea', label: '3. 備考', id: 'note', placeholder: '（任意）', rows: 2 },
    ]
  },
  {
    id: 'kekkin',
    icon: '&#x1F3E5;',
    name: '欠勤申請',
    desc: '体調不良・やむを得ない欠勤の申請',
    docTitle: '欠勤申請書',
    intro: '下記の通り、欠勤を申請いたします。',
    showDuration: true,
    fields: [
      { type: 'daterange', label: '1. 期間', id: 'period', withTime: true },
      { type: 'text', label: '2. 事由', id: 'reason', placeholder: '例：体調不良のため' },
      { type: 'textarea', label: '3. 備考', id: 'note', placeholder: '（任意）', rows: 2 },
    ]
  },
  {
    id: 'daikyu',
    icon: '&#x1F504;',
    name: '代休申請',
    desc: '残業・休日出勤の代替休暇申請',
    docTitle: '代理休暇申請書',
    intro: '下記の通り、代理休暇を申請いたします。',
    showDuration: true,
    fields: [
      { type: 'daterange', label: '1. 期間', id: 'period', withTime: true },
      { type: 'text', label: '2. 事由', id: 'reason', placeholder: '例：当月残業調整用' },
      { type: 'textarea', label: '3. 備考', id: 'note', placeholder: '（任意）', rows: 2 },
    ]
  },
  {
    id: 'furikae',
    icon: '&#x1F4C5;',
    name: '振替休日申請',
    desc: '休日出勤の振替日取得申請',
    docTitle: '振替休日申請書',
    intro: '下記の通り、休日振替のため申請いたします。',
    showDuration: false,
    fields: [
      { type: 'date', label: '1. 出勤日', id: 'workday' },
      { type: 'date', label: '2. 希望休日', id: 'holiday' },
      { type: 'text', label: '3. 事由', id: 'reason', placeholder: '' },
    ]
  },
  {
    id: 'kibiki',
    icon: '&#x1F54A;&#xFE0F;',
    name: '忌引休暇申請',
    desc: '家族・親族の訃報に伴う休暇申請',
    docTitle: '忌引休暇申請書',
    intro: '下記の通り、忌引休暇を申請いたします。',
    showDuration: false,
    fields: [
      { type: 'daterange', label: '1. 期間', id: 'period' },
      { type: 'text', label: '2. 続柄', id: 'relation', placeholder: '例：父（実父）' },
      { type: 'textarea', label: '3. 備考', id: 'note', placeholder: '両親・実兄弟は2日、それ以外の親族は1日', rows: 2 },
    ]
  },
];

let currentApp = null;
let pageCount = 0;

function buildMenu() {
  const grid = document.getElementById('menuGrid');
  APPLICATIONS.forEach(app => {
    const card = document.createElement('div');
    card.className = 'menu-card';
    card.innerHTML = `<div class="card-icon">${app.icon}</div><div class="card-text"><h3>${app.name}</h3><p>${app.desc}</p></div>`;
    card.onclick = () => showForm(app.id);
    grid.appendChild(card);
  });
}

const YOUBI = ['日','月','火','水','木','金','土'];
function getYoubi(s) { if(!s) return ''; const d=new Date(s); return YOUBI[d.getDay()]; }
function formatDateWithYoubi(s) {
  if(!s) return '';
  const d=new Date(s);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}（${YOUBI[d.getDay()]}）`;
}
function updateYoubi(inputId, labelId) {
  const val = document.getElementById(inputId)?.value;
  const el = document.getElementById(labelId);
  if(el) el.textContent = val ? `（${getYoubi(val)}）` : '';
}
function updatePrintDate(inputId, printId) {
  const val = document.getElementById(inputId)?.value;
  const el = document.getElementById(printId);
  if(el) el.textContent = val ? formatDateWithYoubi(val) : '';
}

function calcDays(id) {
  updateYoubi(id+'_from', id+'_from_yobi');
  updateYoubi(id+'_to', id+'_to_yobi');
  updatePrintDate(id+'_from', id+'_from_print');
  updatePrintDate(id+'_to', id+'_to_print');
  const from = document.getElementById(id+'_from')?.value;
  const to   = document.getElementById(id+'_to')?.value;
  const el   = document.getElementById(id+'_days');
  if(!el) return;
  // withTime（時刻入力あり）の場合は日数表示しない
  const hasTime = !!document.getElementById(id+'_start_time');
  if(hasTime) { el.textContent = ''; return; }
  if(from && to) {
    const diff = Math.round((new Date(to)-new Date(from))/(86400000))+1;
    if(diff > 0) {
      const sel = document.querySelector(`input[name="${id}_duration"]:checked`);
      const durVal = sel ? sel.value : '一日';
      if(durVal === '半日（午前）' || durVal === '半日（午後）') {
        el.textContent = '（半日）';
      } else {
        el.textContent = `（${diff}日間）`;
      }
    } else {
      el.textContent = '';
    }
  } else { el.textContent = ''; }
}

function updateDuration(id) {
  const sel = document.querySelector(`input[name="${id}_duration"]:checked`);
  const label = document.getElementById(id+'_duration_label');
  if(label) label.textContent = sel && sel.value!=='一日' ? sel.value : '';
  calcDays(id);
}

function updateDocDate(idx) {
  const inputId = 'docDate_'+idx;
  const val = document.getElementById(inputId)?.value;
  const yi = document.getElementById('docDateYobi_'+idx);
  const pi = document.getElementById('docDatePrint_'+idx);
  if(yi) yi.textContent = val ? `（${getYoubi(val)}）` : '';
  if(pi) pi.textContent = val ? formatDateWithYoubi(val) : '';
}

function toggleStamp(idx) {
  const stamp = document.getElementById('stampMark_'+idx);
  const btn   = document.getElementById('signBtn_'+idx);
  if(!stamp) return;
  if(stamp.classList.contains('visible')) {
    stamp.classList.remove('visible');
    if(btn) btn.style.display='';
  } else {
    stamp.classList.add('visible');
    if(btn) btn.style.display='none';
  }
}

function buildDocHTML(app, idx) {
  const today = new Date().toISOString().split('T')[0];
  let fieldsHTML = '';

  app.fields.forEach(f => {
    const fid = f.id+'_'+idx;
    let input = '';
    if(f.type==='daterange') {
      const timeInputs = f.withTime ? `
        <span>（</span>
        <input type="time" id="${fid}_start_time" value="09:00">
        <span>〜</span>
        <input type="time" id="${fid}_end_time" value="18:00">
        <span>）</span>` : '';
      const durationHTML = (app.showDuration && !f.withTime) ? `
      <div class="duration-select">
        <span>取得区分：</span>
        <label><input type="radio" name="${fid}_duration" value="一日" onchange="updateDuration('${fid}')" checked> 一日</label>
        <label><input type="radio" name="${fid}_duration" value="半日（午前）" onchange="updateDuration('${fid}')"> 半日（午前）</label>
        <label><input type="radio" name="${fid}_duration" value="半日（午後）" onchange="updateDuration('${fid}')"> 半日（午後）</label>
        <span id="${fid}_duration_label" style="color:var(--accent);font-weight:500;"></span>
      </div>` : '';
      input = `<div class="date-range">
        <input type="date" id="${fid}_from" onchange="calcDays('${fid}')">
        <span class="print-date" id="${fid}_from_print"></span>
        <span class="days-count" id="${fid}_from_yobi"></span>
        <span>〜</span>
        <input type="date" id="${fid}_to" onchange="calcDays('${fid}')">
        <span class="print-date" id="${fid}_to_print"></span>
        <span class="days-count" id="${fid}_to_yobi"></span>
        ${timeInputs}
        <span class="days-count" id="${fid}_days"></span>
      </div>${durationHTML}`;
    } else if(f.type==='date') {
      input = `<input type="date" id="${fid}"><span class="print-date" id="${fid}_print"></span>`;
    } else if(f.type==='textarea') {
      input = `<textarea id="${fid}" rows="${f.rows||2}" placeholder="${f.placeholder||''}"></textarea>`;
    } else {
      input = `<input type="text" id="${fid}" placeholder="${f.placeholder||''}">`;
    }
    fieldsHTML += `<div class="field-row">
      <div class="field-label">${f.label}</div>
      <div class="field-input">${input}</div>
    </div>`;
  });

  return `
    <div class="doc-date">
      <input type="date" id="docDate_${idx}" value="${today}" onchange="updateDocDate(${idx})">
      <span class="print-date" id="docDatePrint_${idx}">${formatDateWithYoubi(today)}</span>
      <span id="docDateYobi_${idx}">（${getYoubi(today)}）</span>
    </div>
    <div class="doc-title">${app.docTitle}</div>
    <div class="doc-meta">
      <div class="doc-meta-row"><label>所属：</label><input type="text" id="dept_${idx}" placeholder="所属部署"></div>
      <div class="doc-meta-row"><label>氏名：</label><input type="text" id="name_${idx}" placeholder="氏名"></div>
    </div>
    <div class="doc-intro">${app.intro}</div>
    <div class="doc-kei">記</div>
    <div class="doc-fields">${fieldsHTML}</div>
    <div class="doc-ijo">以上</div>
    <div class="approval-section">
      <div class="approval-box">
        <div class="approval-header">上長承認</div>
        <div class="approval-body">
          <div class="stamp" id="stampMark_${idx}">承認</div>
          <button class="approval-sign-btn" id="signBtn_${idx}" onclick="toggleStamp(${idx})">承認する</button>
        </div>
      </div>
    </div>`;
}

function showForm(id) {
  currentApp = APPLICATIONS.find(a => a.id===id);
  if(!currentApp) return;
  pageCount = 0;
  document.getElementById('menuScreen').style.display = 'none';
  document.getElementById('formScreen').style.display = 'block';
  document.getElementById('docContainer').innerHTML = '';
  addPage();
}

function addPage() {
  if(!currentApp) return;
  const container = document.getElementById('docContainer');
  if(pageCount > 0) {
    const divider = document.createElement('div');
    divider.className = 'page-divider';
    divider.innerHTML = `<span>ページ ${pageCount+1}</span>`;
    container.appendChild(divider);
  }
  const doc = document.createElement('div');
  doc.className = 'doc';
  doc.id = 'doc_'+pageCount;
  doc.innerHTML = buildDocHTML(currentApp, pageCount);
  container.appendChild(doc);
  pageCount++;
}

function goBack() {
  document.getElementById('formScreen').style.display = 'none';
  document.getElementById('menuScreen').style.display = 'block';
  currentApp = null;
  pageCount = 0;
}

function clearAll() {
  document.querySelectorAll('#docContainer input[type="text"], #docContainer textarea').forEach(el => el.value='');
}

function printDoc() { window.print(); }

buildMenu();
</script>
</body>
</html>
